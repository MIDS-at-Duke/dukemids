<script>
(function () {
  function expandNav() {
    document.querySelectorAll('[aria-label="Open Folder"]').forEach(function (btn) {
      if (btn.getAttribute('aria-expanded') === 'false') {
        btn.click();
      }
    });
  }
  // React renders the nav asynchronously — poll until buttons appear
  var attempts = 0;
  var interval = setInterval(function () {
    var buttons = document.querySelectorAll('[aria-label="Open Folder"]');
    if (buttons.length > 0) {
      expandNav();
      clearInterval(interval);
    } else if (++attempts > 50) {
      clearInterval(interval);
    }
  }, 50);
})();
</script>
